name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Pre-launch: publishes the static "Em Construção" placeholder from Landing Page/.
# (Replaced the Next.js build, which failed fetching Brazilian gov APIs from
# GitHub runners. Restore that workflow from git history at launch.)
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble static placeholder site
        run: |
          mkdir -p _site
          cp "Landing Page/construcao.html" _site/index.html
          cp -r "Landing Page/assets" _site/assets
          printf 'www.cartadapopular.com.br\n' > _site/CNAME
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
